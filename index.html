<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的一周年纪念日</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 花瓣背景容器 -->
    <div class="flower-bg" id="flowerBox"></div>

    <div class="main-box">
        <h1 class="title">✨ 一周年快乐 ✨</h1>
        <div class="love-text">
            致我最爱的人<br>
            不知不觉，我们已经携手走过一整年
        </div>

        <!-- 倒计时区域 -->
        <div class="time-box">
            <p>在一起总时长</p>
            <div class="time-num" id="timeCount"></div>
        </div>

        <!-- 情话卡片 -->
        <div class="card">
            <p>初见时的心动，至今仍未消散</p>
            <p>三餐四季，岁岁年年，我只想和你</p>
            <p>下一个周年，下下个周年，全部都不缺席</p>
        </div>

        <div class="heart">❤️</div>
        <div class="footer">
            相恋起始日期：2025-07-14 | 一周年纪念：2026-07-14
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
